name: Docker Build & Push

on:
  workflow_call:
    inputs:
      image_name:
        description: "Full image name (e.g., ghcr.io/sushiibot/modmail)"
        required: true
        type: string
      dockerfile:
        description: "Path to Dockerfile"
        required: false
        default: "./Dockerfile"
        type: string
      context:
        description: "Docker build context"
        required: false
        default: "."
        type: string
      platforms:
        description: "Target platforms"
        required: false
        default: "linux/amd64,linux/arm64"
        type: string
      build_args:
        description: "Multiline build args"
        required: false
        default: ""
        type: string
    outputs:
      image_version:
        description: "Short git SHA used as image tag"
        value: ${{ jobs.build.outputs.image_version }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_version: ${{ steps.version.outputs.short_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image version
        id: version
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: |
            ${{ inputs.image_name }}:latest
            ${{ inputs.image_name }}:${{ steps.version.outputs.short_sha }}
          build-args: ${{ inputs.build_args }}
          cache-from: type=registry,ref=${{ inputs.image_name }}:buildcache
          cache-to: type=registry,ref=${{ inputs.image_name }}:buildcache,mode=max
